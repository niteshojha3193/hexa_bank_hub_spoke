name: B26Goldenpipelineinfra
trigger: none
#  branches:
#     include:
#       - main
#       - feature/*
pool: banking_agent 
parameters:
  - name: environment
    default: dev
    values:
      - dev
      - prod
      - qa
stages:
  - stage: terraforminit_validate_plan_security
    displayName: terraform init + validate + plan
    jobs:
      - job: tfsec
        displayName: securitychecktfsec
        steps:
         
        - task: tfsec@1
          inputs:
           version: 'v1.26.0'
           dir: '$(System.DefaultWorkingDirectory)/infra'
      - job: terraforminit
        displayName: init and validate
        steps:
          - task: TerraformTask@5
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: '$(System.DefaultWorkingDirectory)/infra/parentmodule'
              backendServiceArm: 'ashishsc'
              backendAzureRmStorageAccountName: 'sabankingapp'
              backendAzureRmContainerName: 'bankingcon'
              backendAzureRmKey: 'infra.tfstate'

          - task: TerraformTask@5
            displayName: terraform validate
            inputs:
              provider: 'azurerm'
              command: 'validate'
              workingDirectory: '$(System.DefaultWorkingDirectory)/infra/parentmodule'

      - job: terraformplan
        displayName: terraform plan

        steps:
          - task: TerraformTask@5
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: '$(System.DefaultWorkingDirectory)/infra/parentmodule'
              backendServiceArm: 'ashishsc'
              backendAzureRmStorageAccountName: 'sabankingapp'
              backendAzureRmContainerName: 'bankingcon'
              backendAzureRmKey: 'infra.tfstate'
          - task: TerraformTask@5
            displayName: terraform plan
            inputs:
              provider: 'azurerm'
              command: 'plan'
              workingDirectory: '$(System.DefaultWorkingDirectory)/infra/parentmodule'
              environmentServiceNameAzureRM: 'ashishsc'

  - stage: manual_validation
    displayName: manual validation
    dependsOn: terraforminit_validate_plan_security
    jobs:
      - job: manualvalidation
        pool: server
        displayName: manual validation
        steps:
          - task: ManualValidation@1
            displayName: manual validation
            inputs:
              notifyUsers: 'ojhanitesh3193@gmail.com'
              approvers: 'ojhanitesh3193@gmail.com'


  - stage: terraform_apply
    displayName: terraform appply stage
    dependsOn: manual_validation
    condition: succeeded()

    jobs:
      - job: terraformapply
        displayName: terraform apply
        steps:

          - task: TerraformTask@5
            displayName: terraform init again (apply stage)
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: '$(System.DefaultWorkingDirectory)/infra/parentmodule'
              backendServiceArm: 'ashishsc'
              backendAzureRmStorageAccountName: 'sabankingapp'
              backendAzureRmContainerName: 'bankingcon'
              backendAzureRmKey: 'infra.tfstate'

          - task: TerraformTask@5
            inputs:
              provider: 'azurerm'
              command: 'apply'
              workingDirectory: '$(System.DefaultWorkingDirectory)/infra/parentmodule'
              # commandOptions: '-var-file $(parameters.environment).auto.tfvars -auto-approve ,'
              environmentServiceNameAzureRM: 'ashishsc'
       
